<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasta Builder — Compose a Restaurant-Level Pasta</title>
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --text: #2c2c2c;
  --muted: #6b6560;
  --accent: #b0623a;
  --accent-light: #f5e3d6;
  --accent-dark: #8a4426;
  --border: #e4dfd8;
  --warm: #c4854c;
  --warm-light: #fdf6ee;
  --warm-border: #e0c9a6;
  --terra: #9c3535;
  --font-body: 'Georgia','Times New Roman',serif;
  --font-ui: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.65;font-size:1rem}

/* Header */
.header{text-align:center;padding:2.5rem 1.5rem 2rem;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-family:var(--font-ui);font-size:clamp(1.5rem,3.5vw,2.2rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:0.3rem}
.header p{color:var(--muted);font-size:0.95rem;max-width:32rem;margin:0 auto;font-style:italic}

/* Progress */
.progress-bar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0.5rem 1rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.progress-step{flex:1;min-width:0;text-align:center;font-family:var(--font-ui);font-size:0.7rem;letter-spacing:0.03em;padding:0.5rem 0.25rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-step.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.progress-step.done{color:var(--accent-dark);border-bottom-color:var(--accent-light)}
.progress-step:hover{color:var(--accent)}

/* Progress rail & always-visible nav */
.layout{display:flex;flex-direction:column}
.rail{position:sticky;top:0;z-index:50}
.rail-nav{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;gap:0.6rem;padding:0.6rem 1rem calc(0.6rem + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border)}
.rail-nav .btn{flex:1}
@media(min-width:901px){
  .layout{flex-direction:row;align-items:flex-start;gap:1rem;max-width:64rem;margin:0 auto;padding:0 1rem}
  .rail{top:3.2rem;width:13rem;flex-shrink:0;padding:1.75rem 0 2rem;max-height:calc(100vh - 3.2rem);overflow-y:auto}
  .progress-bar{flex-direction:column;background:transparent;border-bottom:none;padding:0;overflow-x:visible}
  .progress-step{flex:none;text-align:left;font-size:0.8rem;padding:0.5rem 0.85rem;border-bottom:none;border-left:2px solid transparent;border-radius:0 6px 6px 0;white-space:normal}
  .progress-step.active{border-left-color:var(--accent);background:var(--accent-light)}
  .progress-step.done{border-left-color:var(--accent-light)}
  .rail-nav{position:static;margin-top:1.25rem;padding:0 0.85rem;background:transparent;border-top:none}
  .main{flex:1;min-width:0;padding-bottom:4rem}
}

/* Main */
.main{max-width:46rem;margin:0 auto;padding:1.5rem 1rem 6.5rem}

/* Stage */
.stage{display:none;animation:fadeIn 0.3s ease}
.stage.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.stage-title{font-family:var(--font-ui);font-size:1.4rem;font-weight:700;margin-bottom:0.2rem}
.stage-sub{color:var(--muted);font-size:0.92rem;margin-bottom:1.5rem;font-style:italic}

/* Category groups */
.cat-group{margin-bottom:1.5rem}
.cat-label{font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.6rem}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:0.7rem 0.85rem;cursor:pointer;transition:all 0.15s}
.card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.card.selected{border-color:var(--accent);background:var(--accent-light)}
.card .name{font-family:var(--font-ui);font-size:0.88rem;font-weight:600;margin-bottom:0.15rem}
.card .desc{font-size:0.78rem;color:var(--muted);line-height:1.4}
.card .badge,.premade-card .badge{display:inline-block;font-family:var(--font-ui);font-size:0.6rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--warm);background:var(--warm-light);border:1px solid var(--warm-border);padding:0.1rem 0.4rem;border-radius:1rem;margin-bottom:0.3rem}
.card .shape-meta{display:flex;gap:0.25rem;flex-wrap:wrap;margin-top:0.35rem}
.card .shape-tag{font-family:var(--font-ui);font-size:0.6rem;padding:0.1rem 0.4rem;border-radius:1rem;background:var(--bg);border:1px solid var(--border);color:var(--muted)}

/* Veg prep selector */
.veg-card{padding:0.7rem 0.85rem}
.veg-card .prep-row{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem}
.prep-btn{font-family:var(--font-ui);font-size:0.68rem;padding:0.2rem 0.55rem;border-radius:1rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--muted);transition:all 0.15s}
.prep-btn:hover{border-color:var(--accent);color:var(--accent)}
.prep-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Sauce builder */
.dress-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:1rem}
.dress-section h4{font-family:var(--font-ui);font-size:0.85rem;font-weight:600;margin-bottom:0.5rem}
.chip-row{display:flex;flex-wrap:wrap;gap:0.35rem}
.chip{font-family:var(--font-ui);font-size:0.78rem;padding:0.3rem 0.7rem;border-radius:1rem;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text);transition:all 0.15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .rec{color:var(--warm);margin-left:0.2rem;font-size:0.65rem}

/* Balance meters */
.balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0}
.balance-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.balance-item .pillar-name{font-family:var(--font-ui);font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem}
.meter-track{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin-bottom:0.4rem}
.meter-fill{height:100%;border-radius:4px;transition:width 0.4s ease}
.meter-fill.acid{background:#c9a52c}
.meter-fill.salt{background:#8b7355}
.meter-fill.fat{background:var(--warm)}
.meter-fill.heat{background:var(--terra)}
.balance-item .sources{font-size:0.75rem;color:var(--muted);line-height:1.4}
.balance-item .suggestion{font-size:0.8rem;color:var(--terra);margin-top:0.35rem;font-style:italic}
.fix-links{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem}
.fix-btn{font-family:var(--font-ui);font-size:0.72rem;padding:0.25rem 0.6rem;border-radius:1rem;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent-dark);cursor:pointer;transition:all 0.15s;text-align:left;line-height:1.3}
.fix-btn:hover{background:var(--accent);color:#fff}

/* Premade sauces */
.premade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.6rem;margin-bottom:1.5rem}
.premade-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:0.7rem 0.85rem;cursor:pointer;transition:all 0.15s}
.premade-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.premade-card.selected{border-color:var(--accent);background:var(--accent-light)}
.premade-card .name{font-family:var(--font-ui);font-size:0.88rem;font-weight:600;margin-bottom:0.15rem}
.premade-card .desc{font-size:0.78rem;color:var(--muted);line-height:1.4}
.howto-box{background:var(--warm-light);border:1px solid var(--warm-border);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:1.5rem}
.howto-box h4{font-family:var(--font-ui);font-size:0.85rem;font-weight:700;margin-bottom:0.4rem;color:var(--warm)}
.howto-box ul{margin:0.3rem 0 0 1.2rem;font-size:0.88rem;line-height:1.7}
.howto-box li{margin-bottom:0.2rem}
.or-divider{font-family:var(--font-ui);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);text-align:center;margin:1.25rem 0;position:relative}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:calc(50% - 1.5rem);height:1px;background:var(--border)}
.or-divider::before{left:0}
.or-divider::after{right:0}

/* Marriage verdict */
.verdict{border-radius:var(--radius);padding:1.25rem 1.4rem;margin-bottom:1.25rem;border:1.5px solid}
.verdict h4{font-family:var(--font-ui);font-size:0.95rem;font-weight:700;margin-bottom:0.3rem}
.verdict p{font-size:0.9rem}
.verdict.good{background:#eef4e9;border-color:#b3cda0}
.verdict.good h4{color:#5a7247}
.verdict.ok{background:var(--warm-light);border-color:var(--warm-border)}
.verdict.ok h4{color:var(--warm)}
.verdict.bad{background:#f8e8e6;border-color:#dbb0aa}
.verdict.bad h4{color:var(--terra)}
.check-list{list-style:none;margin:1rem 0}
.check-list li{display:flex;align-items:baseline;gap:0.6rem;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.9rem}
.check-list .check-mark{font-family:var(--font-ui);color:var(--accent);font-weight:700;flex-shrink:0}

/* Saved pastas */
.save-btn{font-family:var(--font-ui);font-size:0.88rem;font-weight:600;padding:0.65rem 1.5rem;border-radius:var(--radius);border:1.5px solid var(--accent);background:var(--accent-light);color:var(--accent-dark);cursor:pointer;transition:all 0.15s;margin-right:0.5rem}
.save-btn:hover{background:var(--accent);color:#fff}
.save-confirm{font-family:var(--font-ui);font-size:0.82rem;color:var(--accent);margin-left:0.5rem;opacity:0;transition:opacity 0.3s}
.save-confirm.show{opacity:1}
.saved-link-btn{font-family:var(--font-ui);font-size:0.82rem;color:var(--accent);cursor:pointer;background:none;border:1px solid var(--accent);padding:0.35rem 0.9rem;border-radius:var(--radius);transition:all 0.15s;text-decoration:none}
.saved-link-btn:hover{background:var(--accent);color:#fff}
.saved-page{max-width:46rem;margin:0 auto;padding:2rem 1rem 4rem}
.saved-page h2{font-family:var(--font-ui);font-size:1.4rem;font-weight:700;margin-bottom:0.3rem}
.saved-page .saved-sub{color:var(--muted);font-size:0.92rem;font-style:italic;margin-bottom:1.5rem}
.saved-page .back-link{font-family:var(--font-ui);font-size:0.82rem;color:var(--accent);cursor:pointer;background:none;border:none;text-decoration:underline;margin-bottom:1.5rem;display:inline-block}
.saved-page .back-link:hover{color:var(--accent-dark)}
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.saved-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;transition:all 0.15s}
.saved-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.saved-card .saved-name-row{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.15rem}
.saved-card .saved-name{font-family:var(--font-ui);font-size:0.95rem;font-weight:600;flex:1;min-width:0}
.saved-card .saved-name input{font-family:var(--font-ui);font-size:0.95rem;font-weight:600;border:1px solid var(--border);border-radius:4px;padding:0.15rem 0.4rem;width:100%;background:var(--bg)}
.saved-card .saved-name input:focus{outline:none;border-color:var(--accent)}
.saved-card .rename-btn{font-family:var(--font-ui);font-size:0.65rem;color:var(--muted);cursor:pointer;background:none;border:none;text-decoration:underline;flex-shrink:0}
.saved-card .rename-btn:hover{color:var(--accent)}
.saved-card .saved-date{font-family:var(--font-ui);font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem}
.saved-card .saved-preview{font-size:0.82rem;color:var(--text);line-height:1.5;margin-bottom:0.75rem}
.saved-card .saved-actions{display:flex;gap:0.5rem}
.saved-card .saved-actions button{font-family:var(--font-ui);font-size:0.78rem;padding:0.35rem 0.8rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.15s}
.saved-card .load-btn{color:var(--accent);border-color:var(--accent)}
.saved-card .load-btn:hover{background:var(--accent);color:#fff}
.saved-card .del-btn{color:var(--muted)}
.saved-card .del-btn:hover{border-color:var(--terra);color:var(--terra)}
.saved-card .confirm-del{display:inline-flex;gap:0.3rem;align-items:center}
.saved-card .confirm-del span{font-family:var(--font-ui);font-size:0.72rem;color:var(--terra)}
.saved-card .confirm-del .yes-btn{color:var(--terra);border-color:var(--terra)}
.saved-card .confirm-del .yes-btn:hover{background:var(--terra);color:#fff}
.saved-card .confirm-del .no-btn{color:var(--muted)}
.no-saved{font-family:var(--font-ui);font-size:0.92rem;color:var(--muted);font-style:italic;text-align:center;padding:3rem 1rem}

/* Export buttons */
.export-row{display:flex;gap:0.4rem;margin-top:0.75rem;flex-wrap:wrap}
.export-btn{font-family:var(--font-ui);font-size:0.75rem;padding:0.35rem 0.7rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.15s}
.export-btn:hover{border-color:var(--accent);color:var(--accent)}
.export-toast{font-family:var(--font-ui);font-size:0.75rem;color:var(--accent);margin-left:0.3rem;opacity:0;transition:opacity 0.3s}
.export-toast.show{opacity:1}

/* Collapsible recipe */
.recipe-toggle{font-family:var(--font-ui);font-size:0.8rem;color:var(--warm);cursor:pointer;background:none;border:none;padding:0.3rem 0;margin-top:0.3rem;transition:color 0.15s}
.recipe-toggle:hover{color:var(--terra)}
.recipe-expand{display:none;background:var(--warm-light);border:1px solid var(--warm-border);border-radius:var(--radius);padding:0.75rem 1rem;margin-top:0.4rem}
.recipe-expand.open{display:block}
.recipe-expand h5{font-family:var(--font-ui);font-size:0.78rem;font-weight:700;color:var(--warm);margin-bottom:0.3rem}
.recipe-expand ul{margin:0.2rem 0 0 1.2rem;font-size:0.82rem;line-height:1.6}
.recipe-expand li{margin-bottom:0.15rem}

/* Start screen */
.start-screen{max-width:46rem;margin:0 auto;padding:2rem 1rem 4rem}
.start-fork{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.fork-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;text-align:center;transition:all 0.15s}
.fork-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.fork-card h3{font-family:var(--font-ui);font-size:1.1rem;font-weight:700;margin-bottom:0.3rem}
.fork-card p{font-size:0.85rem;color:var(--muted)}
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:0.75rem}
.template-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem;cursor:pointer;transition:all 0.15s}
.template-card:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.template-card .name{font-family:var(--font-ui);font-size:0.95rem;font-weight:600;margin-bottom:0.2rem}
.template-card .desc{font-size:0.8rem;color:var(--muted);line-height:1.4;margin-bottom:0.5rem}
.template-card .tags{display:flex;flex-wrap:wrap;gap:0.25rem}
.template-card .tag{font-family:var(--font-ui);font-size:0.62rem;padding:0.12rem 0.45rem;border-radius:1rem;background:var(--accent-light);color:var(--accent-dark)}
.template-banner{font-family:var(--font-ui);font-size:0.82rem;background:var(--accent-light);color:var(--accent-dark);padding:0.5rem 1rem;border-radius:var(--radius);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center}
.template-banner button{font-family:var(--font-ui);font-size:0.72rem;background:none;border:1px solid var(--accent);color:var(--accent);padding:0.2rem 0.6rem;border-radius:var(--radius);cursor:pointer}
.template-banner button:hover{background:var(--accent);color:#fff}
@media(max-width:500px){
  .start-fork{grid-template-columns:1fr}
  .template-grid{grid-template-columns:1fr 1fr}
}

/* Summary card */
.summary-card{background:var(--surface);border:2px solid var(--accent);border-radius:var(--radius);padding:2rem;margin-top:1rem}
.summary-card h3{font-family:var(--font-ui);font-size:1.1rem;font-weight:700;margin-bottom:0.15rem}
.summary-card .summary-sub{color:var(--muted);font-size:0.85rem;font-style:italic;margin-bottom:1.25rem}
.summary-section{margin-bottom:1rem}
.summary-section .ss-label{font-family:var(--font-ui);font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:0.3rem}
.summary-section ul{list-style:none;font-size:0.88rem;line-height:1.6}
.summary-section li::before{content:'· ';color:var(--accent);font-weight:700}
.plating-tips{background:var(--warm-light);border:1px solid var(--warm-border);border-radius:var(--radius);padding:1rem;margin-top:1rem}
.plating-tips h4{font-family:var(--font-ui);font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--warm);margin-bottom:0.4rem}
.plating-tips ul{font-size:0.85rem;margin-left:1.2rem;color:var(--text)}
.plating-tips li{margin-bottom:0.3rem}

/* Buttons */
.nav-buttons{display:flex;justify-content:space-between;margin-top:2rem;gap:1rem}
.btn{font-family:var(--font-ui);font-size:0.88rem;font-weight:600;padding:0.65rem 1.5rem;border-radius:var(--radius);border:none;cursor:pointer;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:0.4;cursor:default}

/* Reset button */
.btn-reset{display:inline-block;margin-top:1.5rem;font-family:var(--font-ui);font-size:0.8rem;color:var(--muted);cursor:pointer;background:none;border:none;text-decoration:underline}
.btn-reset:hover{color:var(--terra)}

/* Selection count hint */
.pick-hint{font-family:var(--font-ui);font-size:0.75rem;color:var(--muted);margin-bottom:1rem}

/* Footer */
.footer{text-align:center;padding:1.5rem;font-family:var(--font-ui);font-size:0.8rem;color:var(--muted);border-top:1px solid var(--border)}
.footer a{color:var(--accent);text-decoration:none}
.footer a:hover{text-decoration:underline}

@media(max-width:500px){
  .card-grid{grid-template-columns:1fr 1fr}
  .balance-grid{grid-template-columns:1fr}
  .summary-card{padding:1.25rem}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>

<style>

.fb-topnav__brand{color:#f5f5f5;text-decoration:none;font-weight:600;font-size:0.95rem;letter-spacing:-0.01em}
.fb-topnav__brand:hover{color:#fff}
.fb-topnav__links{display:flex;gap:0.25rem}
.fb-topnav__link{color:#bbb;text-decoration:none;font-size:0.85rem;font-weight:500;padding:0.45rem 0.9rem;border-radius:6px;transition:background 0.15s,color 0.15s}
.fb-topnav__link:hover{color:#fff;background:#2a2a2a}
.fb-topnav__link--active{color:#fff;background:#2a2a2a}
</style>

// ============================================================
//  PAIRING ENGINE
// ============================================================
function getAllSelected() {
  const ids = new Set();
  if (state.shape) ids.add(state.shape.id);
  state.vegs.forEach(v => ids.add(v.id));
  state.protein.forEach(p => ids.add(p.id));
  state.sauceFat.forEach(f => ids.add(f));
  state.sauceAromatics.forEach(a => ids.add(a));
  state.sauceBody.forEach(b => ids.add(b));
  state.sauceUmami.forEach(u => ids.add(u));
  state.finishes.forEach(f => ids.add(f.id));
  return ids;
}

function getAllTags() {
  const tags = {};
  const add = (t) => { tags[t] = (tags[t]||0) + 1; };
  state.vegs.forEach(v => v.tags.forEach(add));
  state.protein.forEach(p => p.tags.forEach(add));
  state.finishes.forEach(f => f.tags.forEach(add));
  return tags;
}

function getAffinityScore(itemId, itemTags) {
  const selected = getAllSelected();
  const tagProfile = getAllTags();
  let score = 0;

  // Contrast pairings
  if (tagProfile.rich && itemTags.some(t => ['bright','tangy','fresh'].includes(t))) score += 2;
  if (tagProfile.bitter && itemTags.some(t => ['rich','savory','sweet'].includes(t))) score += 2;
  if (tagProfile.spicy && itemTags.some(t => ['creamy','mild','sweet'].includes(t))) score += 1;
  if (tagProfile.earthy && itemTags.some(t => ['bright','tangy'].includes(t))) score += 1;

  // Complement pairings
  if (tagProfile.umami && itemTags.includes('umami')) score += 1;
  if (tagProfile.bright && itemTags.includes('herbaceous')) score += 1;
  if (tagProfile.nutty && itemTags.includes('nutty')) score += 1;

  // Classic pair bonus
  for (const combo of CLASSIC_PAIRS) {
    if (combo.includes(itemId)) {
      const others = combo.filter(c => c !== itemId);
      const matched = others.filter(c => selected.has(c)).length;
      if (matched >= 1) score += matched * 2;
    }
  }

  return score;
}

function isRecommended(itemId, itemTags) {
  return getAffinityScore(itemId, itemTags || []) >= 2;
}

// Shape ↔ sauce style affinity (0 fight / 1 works / 2 classic)
function shapeSauceAffinity(styleId) {
  if (!state.shape || !styleId) return null;
  const a = state.shape.affinity[styleId];
  return (a === undefined) ? 1 : a;
}

const FAMILY_LABEL = {strand:'long strand',ribbon:'ribbon',tube:'tube',shape:'short shape',filled:'filled pasta'};

function marriageVerdict() {
  if (!state.shape || !state.sauceStyle) return null;
  const pm = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;
  // A named classic on its traditional shape outranks the generic style affinity
  if (pm && pm.classicShapes.includes(state.shape.id)) {
    return {cls:'good',title:'A classic marriage',
      text:`${state.shape.name} ${pm.suffix} is the canonical dish — this is exactly the shape ${pm.name.toLowerCase()} was built around. Tradition has done the engineering for you.`};
  }
  const aff = shapeSauceAffinity(state.sauceStyle);
  const styleName = (SAUCE_STYLES.find(s=>s.id===state.sauceStyle)||{}).name || 'this sauce';
  const fam = FAMILY_LABEL[state.shape.family];
  if (aff === 2) return {cls:'good',title:'A classic marriage',
    text:`${state.shape.name} and ${styleName.toLowerCase()} sauce are a canonical pairing — the ${fam}'s ${state.shape.surface} surface and ${state.shape.weight} build are exactly what this sauce wants to cling to.`};
  if (aff === 1) return {cls:'ok',title:'A solid match',
    text:`${state.shape.name} will carry a ${styleName.toLowerCase()} sauce respectably. Not the textbook pairing, but nobody at the table will object — just mind the sauce consistency so it coats rather than pools.`};
  return {cls:'bad',title:'These two are fighting',
    text:`A ${state.shape.weight} ${fam} like ${state.shape.name} struggles with ${styleName.toLowerCase()} sauce — the weight and surface don't line up, so the sauce will slide off or bury the pasta. Consider a different shape, or own the heresy on purpose.`};
}

function marriageWarnings() {
  const warns = [];
  const seafood = state.protein.some(p => ['shrimp','clams','tuna'].includes(p.id));
  if (seafood && (state.sauceStyle === 'cream' || state.sauceBody.includes('cream-b'))) {
    warns.push('Cream with seafood makes Italian grandmothers weep. The sweetness of shellfish gets smothered — an olive-oil and wine base lets it sing. (Your kitchen, your rules.)');
  }
  if (seafood && state.finishes.some(f => f.cat === 'cheese')) {
    warns.push('Cheese on seafood pasta breaks a famous Italian rule — the cheese flattens the delicate brine. Pangrattato gives you the same richness without the argument.');
  }
  if (state.shape && state.shape.family === 'filled' && state.sauceStyle === 'ragu') {
    warns.push('A heavy ragù buries filled pasta — the filling is the star, and it\'s already rich. Brown butter, sage, or a light cream lets it speak.');
  }
  if (state.shape && state.shape.weight === 'delicate' && (state.sauceStyle === 'ragu' || state.vegs.length + state.protein.length > 2)) {
    warns.push(`${state.shape.name} is delicate — pile on chunky elements and the pasta becomes a garnish in its own dish. Keep additions minimal.`);
  }
  if (state.sauceStyle === 'pesto' && state.protein.some(p => ['meatballs','short-rib','sausage'].includes(p.id))) {
    warns.push('Pesto is a raw, fresh sauce — heavy browned meats steamroll it. If you want meat with pesto, prosciutto or nothing.');
  }
  return warns;
}

// ============================================================
//  BALANCE CALCULATOR
// ============================================================
function findComponent(catKey, id) {
  return SAUCE_COMPONENTS[catKey].items.find(i => i.id === id);
}

function calcBalance() {
  const b = {acid:0, salt:0, fat:0, heat:0, acidSrc:[], saltSrc:[], fatSrc:[], heatSrc:[]};
  // Sauce fat
  state.sauceFat.forEach(f => {
    const it = findComponent('fats', f); if (!it) return;
    b.fat += 2; b.fatSrc.push(it.name);
    if (f === 'guanciale-fat') { b.salt += 1; b.saltSrc.push(it.name); }
  });
  // Aromatics
  state.sauceAromatics.forEach(a => {
    const it = findComponent('aromatics', a); if (!it) return;
    if (a === 'chili-flake') { b.heat += 2; b.heatSrc.push(it.name); }
    if (a === 'black-pepper') { b.heat += 1; b.heatSrc.push(it.name); }
    if (a === 'anchovy-melt') { b.salt += 1.5; b.saltSrc.push(it.name); }
  });
  // Body
  state.sauceBody.forEach(bd => {
    const it = findComponent('body', bd); if (!it) return;
    if (['crushed-tomato','cherry-tomato-b'].includes(bd)) { b.acid += 1.5; b.acidSrc.push(it.name); }
    if (bd === 'white-wine') { b.acid += 1; b.acidSrc.push(it.name); }
    if (bd === 'lemon-juice') { b.acid += 2; b.acidSrc.push(it.name); }
    if (bd === 'cream-b') { b.fat += 1.5; b.fatSrc.push(it.name); }
  });
  // Umami boosters
  state.sauceUmami.forEach(u => {
    const it = findComponent('umami', u); if (!it) return;
    b.salt += 1; b.saltSrc.push(it.name);
    if (u === 'capers-olives') { b.acid += 0.5; b.acidSrc.push(it.name); }
    if (['parm-u','pecorino-u'].includes(u)) { b.fat += 0.5; }
  });
  // Vegetables
  state.vegs.forEach(v => {
    if (v.prep === 'pickled' || v.prep === 'marinated') { b.acid += 1; b.acidSrc.push(v.name+' ('+v.prep+')'); }
    if (v.tags.includes('bright') || v.tags.includes('tangy')) { b.acid += 0.5; b.acidSrc.push(v.name); }
    if (v.prep === 'fried') { b.fat += 0.5; b.fatSrc.push(v.name+' (fried)'); }
  });
  // Protein
  state.protein.forEach(p => {
    if (p.tags.includes('rich')) { b.fat += 1; b.fatSrc.push(p.name); }
    if (p.tags.includes('umami') || p.tags.includes('savory')) { b.salt += 1; b.saltSrc.push(p.name); }
    if (p.tags.includes('spicy')) { b.heat += 1; b.heatSrc.push(p.name); }
  });
  // Finishes
  state.finishes.forEach(f => {
    if (f.cat === 'cheese') { b.salt += 1; b.saltSrc.push(f.name); b.fat += 0.5; }
    if (f.tags.includes('bright')) { b.acid += 0.5; b.acidSrc.push(f.name); }
    if (f.tags.includes('tangy')) { b.acid += 0.5; b.acidSrc.push(f.name); }
    if (f.tags.includes('spicy')) { b.heat += 1.5; b.heatSrc.push(f.name); }
    if (f.tags.includes('rich')) { b.fat += 0.5; b.fatSrc.push(f.name); }
    if (f.tags.includes('umami') && f.cat !== 'cheese') { b.salt += 0.5; b.saltSrc.push(f.name); }
  });
  // Normalize
  const max = 5;
  b.acid = Math.min(b.acid, max);
  b.salt = Math.min(b.salt, max);
  b.fat = Math.min(b.fat, max);
  b.heat = Math.min(b.heat, max);
  return b;
}

const $container = document.getElementById('stageContainer');
const $progress = document.getElementById('progressBar');
const $rail = document.getElementById('railWrap');
const $railNav = document.getElementById('railNav');

function renderProgress() {
  if (state.showStartScreen) { $rail.style.display = 'none'; return; }
  $rail.style.display = '';
  $progress.innerHTML = STAGES.map((s,i) => {
    let cls = 'progress-step';
    if (i === state.currentStage) cls += ' active';
    else if (i < state.currentStage) cls += ' done';
    return `<div class="${cls}" data-idx="${i}">${s.title}</div>`;
  }).join('');
  $progress.querySelectorAll('.progress-step').forEach(el => {
    el.addEventListener('click', () => {
      const idx = +el.dataset.idx;
      goTo(idx);
    });
  });
  renderRailNav();
}

function renderRailNav() {
  const isFirst = state.currentStage === 0;
  const isLast = state.currentStage === STAGES.length - 1;
  $railNav.innerHTML = `
    <button class="btn btn-secondary" ${isFirst?'disabled':''} onclick="goTo(${state.currentStage-1})">Back</button>
    <button class="btn btn-primary" ${isLast?'disabled':''} onclick="goTo(${state.currentStage+1})">Next</button>`;
}

function goTo(idx) {
  state.currentStage = idx;
  renderProgress();
  renderStage(true);
}

function applySaucePreset(pm) {
  state.saucePreset = pm.id;
  state.sauceStyle = pm.style;
  state.sauceFat = [...pm.fat];
  state.sauceAromatics = [...pm.aromatics];
  state.sauceBody = [...pm.body];
  state.sauceUmami = [...pm.umami];
}

function clearSauce() {
  state.saucePreset = null;
  state.sauceStyle = null;
  state.sauceFat = [];
  state.sauceAromatics = [];
  state.sauceBody = [];
  state.sauceUmami = [];
}

function applyTemplate(templateId) {
  const t = CLASSIC_TEMPLATES.find(c => c.id === templateId);
  if (!t) return;

  state.shape = shapeLookup(t.shape);
  state.vegs = t.vegs.map(v => vegLookup(v.id, v.prep)).filter(Boolean);
  state.protein = t.protein.map(p => proLookup(p.id, p.prep)).filter(Boolean);
  state.finishes = (t.finishes||[]).map(id => finLookup(id)).filter(Boolean);

  if (t.saucePreset) {
    const pm = PREMADE_SAUCES.find(p => p.id === t.saucePreset);
    if (pm) applySaucePreset(pm);
  } else if (t.sauce) {
    state.saucePreset = null;
    state.sauceStyle = t.sauce.style;
    state.sauceFat = [...t.sauce.fat];
    state.sauceAromatics = [...t.sauce.aromatics];
    state.sauceBody = [...t.sauce.body];
    state.sauceUmami = [...t.sauce.umami];
  }

  state.templateName = t.name;
  state.showStartScreen = false;
  state.currentStage = 0;
  renderProgress();
  renderStage(true);
}

function startFromScratch() {
  state.showStartScreen = false;
  state.templateName = null;
  state.currentStage = 0;
  renderProgress();
  renderStage(true);
}

function renderShape() {
  let html = '';
  SHAPES.forEach(cat => {
    html += `<div class="cat-group"><div class="cat-label">${cat.cat}</div><div class="card-grid">`;
    cat.items.forEach(item => {
      const sel = state.shape && state.shape.id === item.id;
      // Recommend shapes that love the already-chosen sauce
      const pmSel = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;
      const rec = !sel && ((pmSel && pmSel.classicShapes.includes(item.id)) ||
        (!pmSel && state.sauceStyle && item.affinity[state.sauceStyle] === 2));
      const meta = `<div class="shape-meta"><span class="shape-tag">${item.weight}</span><span class="shape-tag">${item.surface}</span></div>`;
      html += cardHTML(item, sel, meta, rec);
    });
    html += '</div></div>';
  });
  html += `<div class="pick-hint">${state.shape ? state.shape.name + ' selected' : 'Pick one shape'}</div>`;
  $container.innerHTML = stageWrap(0, html);
  $container.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (state.shape && state.shape.id === id) { state.shape = null; }
      else { state.shape = shapeLookup(id); }
      renderStage();
    });
  });
}

function renderSauce() {
  // Premade sauces
  let html = '<div class="cat-group"><div class="cat-label">Start with a classic (or build your own below)</div><div class="premade-grid">';
  PREMADE_SAUCES.forEach(pm => {
    const sel = state.saucePreset === pm.id;
    const rec = !sel && state.shape && (pm.classicShapes.includes(state.shape.id) || state.shape.affinity[pm.style] === 2);
    html += `<div class="premade-card ${sel?'selected':''}" data-id="${pm.id}" data-role="premade">
      ${rec?'<span class="badge">Loves your shape</span>':''}
      <div class="name">${pm.name}</div>
      <div class="desc">${pm.desc}</div>
    </div>`;
  });
  html += '</div></div>';

  if (state.saucePreset) {
    const pm = PREMADE_SAUCES.find(p => p.id === state.saucePreset);
    if (pm) {
      html += `<div class="howto-box">
        <h4>${pm.name} — How to Make It</h4>
        ${pm.howto}
      </div>`;
      html += `<button class="btn-secondary btn" style="margin-top:0.5rem" onclick="clearSauce();renderStage()">Build my own instead</button>`;
    }
  } else {
    html += '<div class="or-divider">or build your own</div>';

    // Style picker
    html += '<div class="cat-group"><div class="cat-label">Sauce Family</div><div class="card-grid">';
    SAUCE_STYLES.forEach(s => {
      const sel = state.sauceStyle === s.id;
      const aff = state.shape ? state.shape.affinity[s.id] : null;
      const rec = !sel && aff === 2;
      const warn = state.shape && aff === 0;
      html += `<div class="card ${sel?'selected':''}" data-id="${s.id}" data-role="style">
        ${rec?'<span class="badge">Loves your shape</span>':''}
        <div class="name">${s.name}</div>
        <div class="desc">${s.desc}${warn?` <em style="color:var(--terra)">(fights with ${state.shape.name})</em>`:''}</div>
      </div>`;
    });
    html += '</div></div>';

    // Sub-components if style selected
    if (state.sauceStyle) {
      const style = state.sauceStyle;
      const fats = SAUCE_COMPONENTS.fats.items.filter(f => f.styles.includes(style));
      html += sauceSub('Base Fat', fats, state.sauceFat, 'fat');
      html += sauceSub('Aromatics — pick 1–3', SAUCE_COMPONENTS.aromatics.items, state.sauceAromatics, 'aromatics');
      html += sauceSub('Body & Liquid — pick 1–2', SAUCE_COMPONENTS.body.items, state.sauceBody, 'body');
      html += sauceSub('Umami & Depth (optional)', SAUCE_COMPONENTS.umami.items, state.sauceUmami, 'umami');
    }
  }

  $container.innerHTML = stageWrap(1, html);

  // Premade card click
  $container.querySelectorAll('[data-role="premade"]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (state.saucePreset === id) {
        clearSauce();
      } else {
        const pm = PREMADE_SAUCES.find(p => p.id === id);
        if (pm) applySaucePreset(pm);
      }
      renderStage();
    });
  });
  // Style card click
  $container.querySelectorAll('[data-role="style"]').forEach(el => {
    el.addEventListener('click', () => {
      clearSauce();
      state.sauceStyle = el.dataset.id;
      renderStage();
    });
  });
  // Chip clicks
  $container.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      state.saucePreset = null; // customizing clears premade
      const role = el.dataset.role;
      const id = el.dataset.id;
      const arr = role==='fat'?state.sauceFat:role==='aromatics'?state.sauceAromatics:role==='body'?state.sauceBody:state.sauceUmami;
      const maxPick = role==='aromatics'?3:role==='body'?2:role==='fat'?2:2;
      const idx = arr.indexOf(id);
      if (idx > -1) arr.splice(idx,1);
      else if (arr.length < maxPick) arr.push(id);
      renderStage();
    });
  });
}

function sauceSub(label, items, selected, role) {
  let html = `<div class="dress-section"><h4>${label}</h4><div class="chip-row">`;
  items.forEach(item => {
    const sel = selected.includes(item.id);
    const rec = !sel && isRecommended(item.id, item.tags);
    html += `<span class="chip ${sel?'selected':''}" data-id="${item.id}" data-role="${role}">${item.name}${rec?'<span class="rec"> ★</span>':''}</span>`;
  });
  html += '</div></div>';
  return html;
}
function renderVegs() {
  let html = '<div class="card-grid">';
  VEGETABLES.forEach(veg => {
    const sel = state.vegs.find(v => v.id === veg.id);
    const rec = !sel && isRecommended(veg.id, veg.tags);
    const preps = veg.preps.map(p =>
      `<button class="prep-btn ${sel && sel.prep===p?'active':''}" data-vid="${veg.id}" data-prep="${p}">${p}</button>`
    ).join('');
    html += `<div class="card veg-card ${sel?'selected':''}" data-id="${veg.id}">
      ${rec?'<span class="badge">Pairs well</span>':''}
      <div class="name">${veg.name}</div>
      <div class="desc">${veg.desc}</div>
      ${sel ? `<div class="prep-row">${preps}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  html += `<div class="pick-hint">${state.vegs.length} selected — the best pastas rarely use more than two</div>`;
  $container.innerHTML = stageWrap(2, html);
  $container.querySelectorAll('.veg-card').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('prep-btn')) return;
      const id = el.dataset.id;
      const idx = state.vegs.findIndex(v => v.id === id);
      if (idx > -1) { state.vegs.splice(idx, 1); }
      else {
        const veg = VEGETABLES.find(v => v.id === id);
        if (veg && state.vegs.length < 3) state.vegs.push({id:veg.id, name:veg.name, tags:veg.tags, prep:veg.preps[0]});
      }
      renderStage();
    });
  });
  $container.querySelectorAll('.prep-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = state.vegs.find(v => v.id === btn.dataset.vid);
      if (v) v.prep = btn.dataset.prep;
      renderStage();
    });
  });
}

function renderProtein() {
  let html = '<div class="card-grid">';
  PROTEINS.forEach(p => {
    const sel = state.protein.find(sp => sp.id === p.id);
    const rec = !sel && isRecommended(p.id, p.tags);
    const preps = p.preps.map(pr =>
      `<button class="prep-btn ${sel && sel.prep===pr?'active':''}" data-pid="${p.id}" data-prep="${pr}">${pr}</button>`
    ).join('');
    html += `<div class="card veg-card ${sel?'selected':''}" data-id="${p.id}">
      ${rec?'<span class="badge">Pairs well</span>':''}
      <div class="name">${p.name}</div>
      <div class="desc">${p.desc}</div>
      ${sel ? `<div class="prep-row">${preps}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  html += `<div class="pick-hint">${state.protein.length} selected — cacio e pepe, marinara, and aglio e olio need none</div>`;
  $container.innerHTML = stageWrap(3, html);
  $container.querySelectorAll('.veg-card').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('prep-btn')) return;
      const id = el.dataset.id;
      const idx = state.protein.findIndex(p => p.id === id);
      if (idx > -1) { state.protein.splice(idx, 1); }
      else {
        const p = PROTEINS.find(p => p.id === id);
        if (p && state.protein.length < 2) state.protein.push({id:p.id, name:p.name, tags:p.tags, prep:p.preps[0]});
      }
      renderStage();
    });
  });
  $container.querySelectorAll('.prep-btn').forEach(btn => {
    btn.addEventListener('click', () => {

function renderBalance() {
  const b = calcBalance();
  const pct = v => Math.round((v / 5) * 100);
  const pillars = [
    {key:'acid',label:'Acid',cls:'acid',val:b.acid,src:b.acidSrc,low:'Needs more brightness — rich pasta without acid eats heavy.',fixes:[
      {text:'Add tomato, wine, or lemon to the sauce',stage:1},
      {text:'Add cherry tomatoes or marinated vegetables',stage:2},
      {text:'Add lemon zest as a finish',stage:5},
    ]},
    {key:'salt',label:'Salt / Umami',cls:'salt',val:b.salt,src:b.saltSrc,low:'Low on savory depth.',fixes:[
      {text:'Add anchovy or an umami booster to the sauce',stage:1},
      {text:'Add cured pork (guanciale, prosciutto)',stage:3},
      {text:'Add a salty cheese finish',stage:5},
    ]},
    {key:'fat',label:'Fat',cls:'fat',val:b.fat,src:b.fatSrc,low:'Could use more richness — fat is what carries the sauce.',fixes:[
      {text:'Adjust the sauce fat',stage:1},
      {text:'Add cheese or a finishing oil',stage:5},
      {text:'Add a rich protein',stage:3},
    ]},
    {key:'heat',label:'Heat',cls:'heat',val:b.heat,src:b.heatSrc,optional:true,low:'',fixes:[]},
  ];

  let html = '<div class="balance-grid">';
  pillars.forEach(p => {
    const weak = !p.optional && p.val < 1.5;
    let fixHtml = '';
    if (weak) {
      fixHtml = `<div class="suggestion">${p.low}</div><div class="fix-links">`;
      p.fixes.forEach(f => {
        fixHtml += `<button class="fix-btn" onclick="goTo(${f.stage})">${f.text} &rarr;</button>`;
      });
      fixHtml += '</div>';
    }
    if (p.optional && p.val === 0) {
      fixHtml = `<div class="sources" style="margin-top:0.35rem;font-style:italic">No heat — perfectly traditional. Add chili flake to the sauce if you want a kick.</div>`;
    }
    html += `<div class="balance-item">
      <div class="pillar-name">${p.label}</div>
      <div class="meter-track"><div class="meter-fill ${p.cls}" style="width:${pct(p.val)}%"></div></div>
      <div class="sources">${p.src.length ? p.src.join(', ') : 'No sources yet'}</div>
      ${fixHtml}
    </div>`;
  });
  html += '</div>';

  const allWeak = pillars.filter(p => !p.optional && p.val < 1.5);
  if (allWeak.length === 0) html += '<p style="color:var(--accent);font-family:var(--font-ui);font-size:0.9rem;margin-top:0.5rem">Looking well-balanced. The final adjustment happens in the pan — taste before you plate.</p>';

  $container.innerHTML = stageWrap(4, html);
}

function renderFinish() {
  let html = '';
  for (const [catKey, cat] of Object.entries(FINISHES)) {
    html += `<div class="cat-group"><div class="cat-label">${cat.label}</div><div class="card-grid">`;
    cat.items.forEach(item => {
      const sel = state.finishes.some(f => f.id === item.id);
      const rec = !sel && isRecommended(item.id, item.tags);
      html += cardHTML(item, sel, '', rec);
    });
    html += '</div></div>';
  }
  html += `<div class="pick-hint">${state.finishes.length} selected</div>`;
  $container.innerHTML = stageWrap(5, html);
  $container.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const idx = state.finishes.findIndex(f => f.id === id);
      if (idx > -1) { state.finishes.splice(idx, 1); }
      else {
        const item = finLookup(id);
        if (item) state.finishes.push(item);
      }
      renderStage();
    });
  });
}

function renderMarriage() {
  let html = '';
  const verdict = marriageVerdict();
  if (verdict) {
    html += `<div class="verdict ${verdict.cls}"><h4>${verdict.title}</h4><p>${verdict.text}</p></div>`;
  } else {
    html += `<div class="verdict ok"><h4>Nothing to judge yet</h4><p>Pick a shape and a sauce and come back — this is where we check whether they belong together.</p></div>`;
  }

  marriageWarnings().forEach(w => {
    html += `<div class="verdict bad"><h4>A word of caution</h4><p>${w}</p></div>`;
  });

  html += `<div class="cat-label" style="margin-top:1.5rem">The Technique Checklist — non-negotiable</div>
  <ul class="check-list">
    <li><span class="check-mark">✓</span> Salt the pasta water until it tastes like the sea — about 1 tablespoon per quart. It's your only chance to season the pasta itself.</li>
    <li><span class="check-mark">✓</span> Reserve a full cup of pasta water before draining. The starch is what binds sauce to noodle.</li>
    <li><span class="check-mark">✓</span> Pull the pasta 2 minutes before the box says al dente — it finishes cooking in the sauce.</li>
    <li><span class="check-mark">✓</span> Marry pasta and sauce in the pan over heat, tossing constantly, loosening with pasta water until the sauce clings.</li>
    <li><span class="check-mark">✓</span> Cheese goes in off the heat, in stages — dumped into a hot pan it clumps instead of melting.</li>
    <li><span class="check-mark">✓</span> Warm the bowls. Pasta cools fast and a cold plate murders the emulsion.</li>
  </ul>`;

  $container.innerHTML = stageWrap(6, html);
}

function generatePastaName() {
  const shapeName = state.shape ? state.shape.name : 'Pasta';
  const pm = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;

  let base;
  if (pm) base = `${shapeName} ${pm.suffix}`;
  else if (state.sauceStyle) {
    const s = SAUCE_STYLES.find(s=>s.id===state.sauceStyle);
    base = `${shapeName} with ${s ? s.name : ''} Sauce`;
  } else base = shapeName;

  // Notable addition: protein > treated veg
  let notable = '';
  if (state.protein.length) notable = state.protein[0].name;
  else if (state.vegs.length) {
    const v = state.vegs[0];
    notable = ['raw','shaved raw'].includes(v.prep) ? v.name : `${v.prep.split(' ')[0]} ${v.name}`;
  }

  if (notable) {
    const full = `${base} with ${notable}`;
    if (full.split(' ').length <= 11) return full;
  }
  return base;
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}

function sauceSummaryParts() {
  const parts = [];
  const pm = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;
  if (pm) parts.push(pm.name);
  else if (state.sauceStyle) {
    const s = SAUCE_STYLES.find(s=>s.id===state.sauceStyle);
    if (s) parts.push(s.name);
  }
  const fatNames = state.sauceFat.map(f => findComponent('fats',f)?.name).filter(Boolean);
  if (fatNames.length) parts.push('Fat: ' + fatNames.join(' + '));
  const aroNames = state.sauceAromatics.map(a => findComponent('aromatics',a)?.name).filter(Boolean);
  if (aroNames.length) parts.push('Aromatics: ' + aroNames.join(', '));
  const bodyNames = state.sauceBody.map(b => findComponent('body',b)?.name).filter(Boolean);
  if (bodyNames.length) parts.push('Body: ' + bodyNames.join(' + '));
  const umNames = state.sauceUmami.map(u => findComponent('umami',u)?.name).filter(Boolean);
  if (umNames.length) parts.push('Umami: ' + umNames.join(', '));
  return parts;
}

const FIN_LABELS = {cheese:'Cheese',herbs:'Herbs',crunch:'Crunch',finishing:'Finishing'};

function renderSummary() {
  const pastaName = generatePastaName();

  let html = '<div id="summaryCapture">';
  html += '<div class="summary-card">';
  html += `<h3>${pastaName}</h3>`;
  html += '<div class="summary-sub">Your composed pasta.</div>';

  if (state.shape) {
    html += summarySection('Shape', [`${state.shape.name} — ${state.shape.weight}, ${state.shape.surface} (${FAMILY_LABEL[state.shape.family]})`]);
  }
  if (state.sauceStyle) {
    html += summarySection('Sauce', sauceSummaryParts());
    const pm = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;
    if (pm) {
      html += `<button class="recipe-toggle" onclick="toggleRecipe()">How to make it ▸</button>`;
      html += `<div class="recipe-expand" id="recipeExpand"><h5>${pm.name}</h5>${pm.howto}</div>`;
    }
  }
  if (state.vegs.length) {
    html += summarySection('Vegetables', state.vegs.map(v => `${v.name} — ${v.prep}`));
  }
  if (state.protein.length) {
    html += summarySection('Protein', state.protein.map(p => `${p.name} — ${p.prep}`));
  }
  if (state.finishes.length) {
    const grouped = {};
    state.finishes.forEach(f => {
      const label = FIN_LABELS[f.cat] || 'Finish';
      (grouped[label] = grouped[label]||[]).push(f.name);
    });
    const finList = Object.entries(grouped).map(([k,v]) => `${k}: ${v.join(', ')}`);
    html += summarySection('Finishing', finList);
  }

  html += '</div>';

  const tips = generateCookingNotes();
  if (tips.length) {
    html += `<div class="plating-tips"><h4>Cooking Notes</h4><ul>${tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`;
  }

  html += '</div>'; // close #summaryCapture

  html += `<div style="margin-top:1.5rem;display:flex;align-items:center;flex-wrap:wrap;gap:0.5rem">
    <button class="save-btn" onclick="savePasta()">Save this pasta</button>
    <span id="saveConfirm" class="save-confirm">Saved!</span>
    <button class="btn-reset" onclick="resetBuilder()" style="margin-top:0">Start over</button>
  </div>`;

  html += `<div class="export-row">
    <button class="export-btn" onclick="exportText()">Copy Text</button>
    <button class="export-btn" onclick="exportImage()">Save Image</button>
    <button class="export-btn" onclick="exportPDF()">Download PDF</button>
    <span id="exportToast" class="export-toast"></span>
  </div>`;

  $container.innerHTML = stageWrap(7, html);
}

function summarySection(label, items) {
  return `<div class="summary-section"><div class="ss-label">${label}</div><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}

function generateCookingNotes() {
  const tips = [];
  const verdict = marriageVerdict();
  if (verdict && verdict.cls === 'bad') {
    tips.push('Your shape and sauce are an unusual pairing — keep the sauce on the looser side so it coats instead of clumping.');
  }
  // Sauce-specific
  if (state.saucePreset === 'pm-carbonara') {
    tips.push('The eggs must never see direct heat. Toss off the flame and let the pasta\'s warmth do the cooking.');
  }
  if (state.sauceStyle === 'pesto') {
    tips.push('Pesto never touches the pan. Toss the hot pasta with it in the serving bowl, loosened with pasta water.');
  }
  if (state.sauceStyle === 'ragu') {
    tips.push('Sauce the pasta, don\'t pasta the sauce — Italians use far less ragù per portion than you think, bound tight with pasta water.');
  }
  if (state.sauceBody.includes('cream-b')) {
    tips.push('Cream reduces fast — pull it while it still pours, because it tightens further on the plate.');
  }
  // Veg
  const fried = state.vegs.filter(v => v.prep === 'fried');
  if (fried.length) tips.push(`Fold the fried ${fried.map(v=>v.name.toLowerCase()).join(' and ')} in at the end so it keeps its texture — reserve a few pieces for the top.`);
  const wilted = state.vegs.filter(v => ['wilted','blanched & sautéed'].includes(v.prep));
  if (wilted.length) tips.push(`Add the ${wilted.map(v=>v.name.toLowerCase()).join(' and ')} to the pan in the final minutes — just long enough to marry with the sauce.`);
  // Protein
  const seafoodSel = state.protein.filter(p => ['shrimp','clams'].includes(p.id));
  if (seafoodSel.length) tips.push('Seafood overcooks in seconds. Pull it early and return it to the pan right at the end.');
  if (state.protein.some(p => p.id === 'guanciale')) tips.push('Render the guanciale slowly from a cold pan — the fat is the foundation of the dish. Save a few crisp pieces for the top.');
  if (state.protein.some(p => p.id === 'sausage')) tips.push('Brown the sausage hard and leave it in craggy pieces — the crust is flavor.');
  // Finish
  const cheeses = state.finishes.filter(f => f.cat === 'cheese');
  if (cheeses.length) tips.push(`Add ${cheeses.map(f=>f.name).join(' and ')} off the heat in stages, tossing between additions — and bring more to the table.`);
  const crunch = state.finishes.filter(f => f.cat === 'crunch');
  if (crunch.length) tips.push(`Scatter ${crunch.map(f=>f.name.toLowerCase()).join(', ')} over the plated pasta at the last second.`);
  if (state.finishes.some(f => f.id === 'burrata')) tips.push('Burrata goes on at the table, torn open over the hot pasta — room temperature, never fridge-cold.');
  // Universal
  tips.push('Twirl long pasta into a nest with tongs and a ladle for height; spoon extra sauce around, not on top.');
  tips.push('Serve in warm, wide bowls. Pasta waits for no one.');
  return tips;
}

// ---- Wrapper ----
function stageWrap(idx, inner) {
  const s = STAGES[idx];
  const banner = state.templateName
    ? `<div class="template-banner"><span>Starting from: <strong>${state.templateName}</strong> — modify anything as you go</span><button onclick="resetBuilder()">Clear all</button></div>`
    : '';
  return `<div class="stage active">
    ${banner}
    <div class="stage-title">${s.title}</div>
    <div class="stage-sub">${s.sub}</div>
    ${inner}
  </div>`;
}

// ---- Master render ----
function renderStage(scrollTop) {
  if (state.showStartScreen) {
    renderStartScreen();
    if (scrollTop) window.scrollTo({top: 0, behavior: 'smooth'});
    return;
  }
  const renderers = [renderShape, renderSauce, renderVegs, renderProtein, renderBalance, renderFinish, renderMarriage, renderSummary];
  renderers[state.currentStage]();
  if (scrollTop) window.scrollTo({top: 0, behavior: 'smooth'});
}

function resetBuilder() {
  state.showStartScreen = true;
  state.templateName = null;
  state.shape = null;
  clearSauce();
  state.vegs = [];
  state.protein = [];
  state.finishes = [];
  state.currentStage = 0;
  renderProgress();
  renderStage();
}

// ============================================================
//  SAVED PASTAS
// ============================================================
function getSavedPastas() {
  try { return JSON.parse(localStorage.getItem('savedPastas') || '[]'); }
  catch { return []; }
}

function buildPreview(s) {
  const parts = [];
  if (s.shape) parts.push(s.shape.name);
  const pm = s.saucePreset ? PREMADE_SAUCES.find(p=>p.id===s.saucePreset) : null;
  if (pm) parts.push(pm.name);
  else if (s.sauceStyle) { const st = SAUCE_STYLES.find(d=>d.id===s.sauceStyle); if(st) parts.push(st.name + ' sauce'); }
  if (s.vegs && s.vegs.length) parts.push(s.vegs.map(v=>`${v.name} (${v.prep})`).join(', '));
  if (s.protein && s.protein.length) parts.push(s.protein.map(p=>`${p.name} (${p.prep})`).join(', '));
  if (s.finishes && s.finishes.length) parts.push(s.finishes.map(f=>f.name).join(', '));
  return parts.join(' · ');
}

function savePasta() {
  const pastas = getSavedPastas();
  const stateSnap = JSON.parse(JSON.stringify({
    shape:state.shape, saucePreset:state.saucePreset, sauceStyle:state.sauceStyle,
    sauceFat:state.sauceFat, sauceAromatics:state.sauceAromatics,
    sauceBody:state.sauceBody, sauceUmami:state.sauceUmami,
    vegs:state.vegs, protein:state.protein, finishes:state.finishes,
  }));
  const entry = {
    id: Date.now(),
    name: generatePastaName(),
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    preview: buildPreview(stateSnap),
    state: stateSnap,
  };
  pastas.unshift(entry);
  localStorage.setItem('savedPastas', JSON.stringify(pastas));
  updateSavedLink();
  const confirm = document.getElementById('saveConfirm');
  if (confirm) { confirm.classList.add('show'); setTimeout(() => confirm.classList.remove('show'), 2000); }
}

function loadPasta(id) {
  const pastas = getSavedPastas();
  const entry = pastas.find(s => s.id === id);
  if (!entry) return;
  Object.assign(state, entry.state);
  state.showStartScreen = false;
  state.showSavedPage = false;
  state.templateName = null;
  state.currentStage = 7;
  renderProgress();
  renderStage(true);
}

function confirmDelete(btn, id) {
  const wrap = btn.parentElement;
  btn.style.display = 'none';
  const confirm = document.createElement('span');
  confirm.className = 'confirm-del';
  confirm.innerHTML = `<span>Delete?</span><button class="yes-btn" style="font-family:var(--font-ui);font-size:0.72rem;padding:0.25rem 0.6rem;border-radius:var(--radius);border:1px solid var(--terra);background:var(--surface);color:var(--terra);cursor:pointer">Yes</button><button class="no-btn" style="font-family:var(--font-ui);font-size:0.72rem;padding:0.25rem 0.6rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer">Cancel</button>`;
  wrap.appendChild(confirm);
  confirm.querySelector('.yes-btn').addEventListener('click', () => deletePasta(id));
  confirm.querySelector('.no-btn').addEventListener('click', () => { confirm.remove(); btn.style.display = ''; });
}

function deletePasta(id) {
  let pastas = getSavedPastas();
  pastas = pastas.filter(s => s.id !== id);
  localStorage.setItem('savedPastas', JSON.stringify(pastas));
  updateSavedLink();
  showSavedPage();
}

function renamePasta(id, newName) {
  const pastas = getSavedPastas();
  const entry = pastas.find(s => s.id === id);
  if (entry) { entry.name = newName; localStorage.setItem('savedPastas', JSON.stringify(pastas)); }
}

function showSavedPage() {
  state.showSavedPage = true;
  $rail.style.display = 'none';
  const pastas = getSavedPastas();

  let html = '<div class="saved-page">';
  html += '<button class="back-link" onclick="closeSavedPage()">&larr; Back to builder</button>';
  html += '<h2>Saved Pastas</h2>';
  html += `<div class="saved-sub">${pastas.length} pasta${pastas.length===1?'':'s'} saved</div>`;

  if (!pastas.length) {
    html += '<p class="no-saved">No saved pastas yet. Build one and save it from the summary page.</p>';
  } else {
    html += '<div class="saved-grid">';
    pastas.forEach(s => {
      const displayName = s.name || 'Untitled Pasta';
      html += `<div class="saved-card" data-id="${s.id}">
        <div class="saved-name-row">
          <div class="saved-name" id="sname-${s.id}">${displayName}</div>
          <button class="rename-btn" data-id="${s.id}">rename</button>
        </div>
        <div class="saved-date">${s.date}</div>
        <div class="saved-preview">${s.preview || 'No details'}</div>
        <div class="saved-actions">
          <button class="load-btn" onclick="loadPasta(${s.id})">Load</button>
          <button class="del-btn" onclick="confirmDelete(this,${s.id})">Delete</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  $container.innerHTML = html;

  $container.querySelectorAll('.rename-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = +btn.dataset.id;
      const $name = document.getElementById('sname-'+id);
      const pastas = getSavedPastas();
      const entry = pastas.find(s => s.id === id);
      const curName = (entry && entry.name) || '';
      $name.innerHTML = `<input type="text" value="${curName}" placeholder="Name this pasta..." autofocus>`;
      const $input = $name.querySelector('input');
      $input.focus();
      $input.select();
      const save = () => { renamePasta(id, $input.value.trim()); showSavedPage(); };
      $input.addEventListener('blur', save);
      $input.addEventListener('keydown', (e) => { if (e.key === 'Enter') save(); });
    });
  });
}

function closeSavedPage() {
  state.showSavedPage = false;
  renderProgress();
  renderStage(true);
}

function updateSavedLink() {
  const count = getSavedPastas().length;
  const $link = document.getElementById('savedLink');
  if (count > 0) {
    $link.innerHTML = `<button class="saved-link-btn" onclick="showSavedPage()">Saved Pastas (${count})</button>`;
  } else {
    $link.innerHTML = '';
  }
}

// ============================================================
//  EXPORT & HELPERS
// ============================================================
function toggleRecipe() {
  const el = document.getElementById('recipeExpand');
  const btn = document.querySelector('.recipe-toggle');
  if (el) {
    el.classList.toggle('open');
    btn.textContent = el.classList.contains('open') ? 'How to make it ▾' : 'How to make it ▸';
  }
}

function showExportToast(msg) {
  const el = document.getElementById('exportToast');
  if (el) { el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
}

function exportText() {
  const name = generatePastaName();
  let lines = [name, ''];
  if (state.shape) lines.push('SHAPE: ' + state.shape.name + ' (' + state.shape.weight + ', ' + state.shape.surface + ')');
  if (state.sauceStyle) {
    sauceSummaryParts().forEach((p,i) => lines.push((i===0?'SAUCE: ':'  ') + p));
    const pm = state.saucePreset ? PREMADE_SAUCES.find(p=>p.id===state.saucePreset) : null;
    if (pm) {
      lines.push('');
      lines.push('HOW TO MAKE ' + pm.name.toUpperCase() + ':');
      const temp = document.createElement('div');
      temp.innerHTML = pm.howto;
      temp.querySelectorAll('li').forEach(li => lines.push('  • ' + li.textContent));
    }
  }
  if (state.vegs.length) lines.push('VEGETABLES: ' + state.vegs.map(v=>`${v.name} — ${v.prep}`).join(', '));
  if (state.protein.length) lines.push('PROTEIN: ' + state.protein.map(p=>`${p.name} — ${p.prep}`).join(', '));
  if (state.finishes.length) {
    const grouped = {};
    state.finishes.forEach(f => {
      const label = FIN_LABELS[f.cat] || 'Finish';
      (grouped[label]=grouped[label]||[]).push(f.name);
    });
    lines.push('FINISHING: ' + Object.entries(grouped).map(([k,v])=>`${k}: ${v.join(', ')}`).join('; '));
  }
  const tips = generateCookingNotes();
  if (tips.length) {
    lines.push('');
    lines.push('COOKING NOTES:');
    tips.forEach(t => lines.push('• ' + t));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => showExportToast('Copied!'));
}

async function exportImage() {
  const el = document.getElementById('summaryCapture');
  if (!el || typeof html2canvas === 'undefined') { showExportToast('Loading...'); return; }
  const recipe = document.getElementById('recipeExpand');
  const wasOpen = recipe && recipe.classList.contains('open');
  if (recipe && !wasOpen) recipe.classList.add('open');
  try {
    const canvas = await html2canvas(el, { backgroundColor: '#faf8f5', scale: 2, useCORS: true });
    if (recipe && !wasOpen) recipe.classList.remove('open');
    const link = document.createElement('a');
    link.download = slugify(generatePastaName()) + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showExportToast('Image saved!');
  } catch(e) {
    if (recipe && !wasOpen) recipe.classList.remove('open');
    showExportToast('Error saving image');
  }
}

async function exportPDF() {
  const el = document.getElementById('summaryCapture');
  if (!el || typeof html2canvas === 'undefined' || typeof jspdf === 'undefined') { showExportToast('Loading...'); return; }
  const recipe = document.getElementById('recipeExpand');
  const wasOpen = recipe && recipe.classList.contains('open');
  if (recipe && !wasOpen) recipe.classList.add('open');
  try {
    const canvas = await html2canvas(el, { backgroundColor: '#faf8f5', scale: 2, useCORS: true });
    if (recipe && !wasOpen) recipe.classList.remove('open');
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [canvas.width, canvas.height] });
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
    pdf.save(slugify(generatePastaName()) + '.pdf');
    showExportToast('PDF downloaded!');
  } catch(e) {
    if (recipe && !wasOpen) recipe.classList.remove('open');
    showExportToast('Error creating PDF');
  }
}

// Make functions available globally
window.goTo = goTo;
window.resetBuilder = resetBuilder;
window.startFromScratch = startFromScratch;
window.applyTemplate = applyTemplate;
window.clearSauce = clearSauce;
window.renderStage = renderStage;
window.savePasta = savePasta;
window.toggleRecipe = toggleRecipe;
window.exportText = exportText;
window.exportImage = exportImage;
window.exportPDF = exportPDF;
window.loadPasta = loadPasta;
window.confirmDelete = confirmDelete;
window.deletePasta = deletePasta;
window.showSavedPage = showSavedPage;
window.closeSavedPage = closeSavedPage;

// Init
renderProgress();
renderStage();
updateSavedLink();
</script>
</body>
</html>
